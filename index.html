<!DOCTYPE html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doomsweeper</title>
    <link rel="icon" href="/Doomsweeper-Bassi_Regiardo/resources/images/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="/Doomsweeper-Bassi_Regiardo/styles/normalize.css">
    <link rel="stylesheet" href="/Doomsweeper-Bassi_Regiardo/styles/index.css">
    <script src="/Doomsweeper-Bassi_Regiardo/scripts/modalFunctionality.js" defer></script>
    <script src="/Doomsweeper-Bassi_Regiardo/scripts/gridBuilder.js" defer></script>
</head>
<body>
    <div class="Header">
        <div class="HeaderTop">
            <img src="/Doomsweeper-Bassi_Regiardo/resources/images/logo.png" alt="Doomsweeper Logo" class="Logo">
        </div>
        <div class="HeaderNav">
            <ul>
                <li><a href="/Doomsweeper-Bassi_Regiardo/index.html">Jugar</a></li>
                <li><a href="/Doomsweeper-Bassi_Regiardo/contacto.html">Contacto</a></li>
                <li><a href="https://github.com/RegiardoManuel3an/Doomsweeper-Bassi_Regiardo">Github</a></li>
            </ul>
        </div>
    </div>
    <div class="Content">
        <div class="VideoContainer">
            <video autoplay loop muted disablepictureinpicture>
                <source src="/Doomsweeper-Bassi_Regiardo/resources/videos/background.mp4" type="video/mp4">
            </video>
            <div class="GameWindow">
                <div class="GameHUD">
                    <div class ="GameHUDOptions">
                        <select id="difficultySelect">
                            <option value="easy">Facil</option>
                            <option value="medium">Medio</option>
                            <option value="hard">Dificil</option>
                        </select>
                    </div>
                    <div class="GameHUDUsername">
                        <input type="text" id="usernameInput" placeholder="Usuario">
                    </div>
                    <div class="GameHUDDoomGuy">
                        <img src="/Doomsweeper-Bassi_Regiardo/resources/images/hudTextures/doomGuyIdle.png" alt="Doom Guy" class="DoomGuyIMG">
                    </div>
                    <div class="GameHUDTimer">
                        <span>Tiempo:</span>
                        <placeholder id="timerPlaceholder">00:00</placeholder>
                    </div>
                    <div class="GameHUDFlags">
                        <span>Banderas:</span>
                        <span id="flagsCount">0</span>
                    </div>
                </div>
                <div class="GameContent">
                    <div id="GameGrid">
                        
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div class="Footer">
        <p>&copy; 2025 Doomsweeper. All rights reserved.</p>
    </div>
    <div id="AlertModal" class="modal">
        <div class="modal-content">
            <span class="close-button" onclick="closeModal()">&times;</span>
            <h2 id="modalTitle"></h2>
            <p id="modalMessage"></p>
            <button id="restartButton" onclick="playAgain()">Jugar de Nuevo</button>
        </div>
    </div>
</body>
</html>
