<!DOCTYPE html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doomsweeper</title>
    <link rel="icon" href="/resources/images/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="/styles/normalize.css">
    <link rel="stylesheet" href="/styles/index.css">
    <script src="/scripts/modalFunctionality.js" defer></script>
    <script src="/scripts/gridBuilder.js" defer></script>
</head>
<body>
    <div class="Header">
        <div class="HeaderTop">
            <img src="/resources/images/logo.png" alt="Doomsweeper Logo" class="Logo">
        </div>
        <div class="HeaderNav">
            <ul>
                <li><a href="/index.html">Jugar</a></li>
                <li><a href="/contacto.html">Contacto</a></li>
                <li><a href="https://github.com/RegiardoManuel3an/Doomsweeper-Bassi_Regiardo">Github</a></li>
            </ul>
        </div>
    </div>
    <div class="Content">
        <div class="VideoContainer">
            <video autoplay loop muted disablepictureinpicture>
                <source src="/resources/videos/background.mp4" type="video/mp4">
            </video>
            <div class="GameWindow">
                <div class="GameHeader">

                </div>
                <div class="GameContent">
                    <div id="GameGrid">
                        
                    </div>
                </div>
                <div class="GameHUD">
                    <div class="GameHUDLeft">
                        
                    </div>
                    <div class="GameHUDRight">
                        
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div class="Footer">
        <p>&copy; 2025 Doomsweeper. All rights reserved.</p>
    </div>
    <div id="AlertModal" class="modal">
        <div class="modal-content">
            <span class="close-button" onclick="closeModal()">&times;</span>
            <h2 id="modalTitle">You Are Dead!</h2>
            <p id="modalMessage">💥 Encontraste un Caco!</p>
            <button id="restartButton" onclick="restartGame()">Jugar de Nuevo</button>
        </div>
    </div>
</body>
</html>
